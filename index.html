<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Elisa</title>
    <style>
        body { background-color: #fdf6e3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #message { text-align: left; width: 80%; max-width: 400px; color: #5b4636; line-height: 1.6; z-index: 10; }
        .flower { position: absolute; width: 12px; height: 12px; background: #ffd700; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.1); transform: scale(0); animation: grow 0.8s ease-out forwards; }
        @keyframes grow { to { transform: scale(1); } }
        #tree-container { position: relative; width: 300px; height: 300px; margin-top: 20px; }
        .trunk { position: absolute; bottom: 0; left: 50%; width: 8px; height: 100px; background: #5b4636; transform: translateX(-50%); border-radius: 5px; }
    </style>
</head>
<body>

<div id="message">
    <p id="text"></p>
</div>

<div id="tree-container">
    <div class="trunk"></div>
</div>

<script>
    const fullText = "Hola, Técnicamente si cuentan como flores ¿No? \n\nLas primeras que doy: \n\nA alguien que odio pero se las merece, pasa lindo día Elisa. \n\n— Te Aprecio mucho!";
    let i = 0;

    function typeWriter() {
        if (i < fullText.length) {
            document.getElementById("text").innerHTML += fullText.charAt(i) === '\n' ? '<br>' : fullText.charAt(i);
            i++;
            setTimeout(typeWriter, 50);
        } else {
            startFlowers();
        }
    }

    function startFlowers() {
        const container = document.getElementById('tree-container');
        for (let j = 0; j < 150; j++) {
            setTimeout(() => {
                const flower = document.createElement('div');
                flower.className = 'flower';
                // Generar forma de corazón/copa
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 80;
                const x = 150 + Math.cos(angle) * radius;
                const y = 100 + Math.sin(angle) * radius;
                
                flower.style.left = x + 'px';
                flower.style.top = y + 'px';
                container.appendChild(flower);
            }, j * 30);
        }
    }

    window.onload = typeWriter;
</script>
</body>
</html>
