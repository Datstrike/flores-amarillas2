<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Hazel</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f6f1e3; font-family: 'Quicksand', sans-serif; color: #4a3320; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; position: relative; }
        .btn-music { position: absolute; top: 20px; right: 20px; background-color: #2b2b2b; color: #ffca28; border: 2px solid #ffca28; padding: 6px 16px; border-radius: 20px; font-family: 'Quicksand', sans-serif; font-weight: bold; font-size: 14px; cursor: pointer; z-index: 100; }
        .container { display: flex; flex: 1; width: 100%; max-width: 1100px; margin: 0 auto; align-items: center; justify-content: center; padding-bottom: 40px; }
        .text-section { flex: 1; padding: 20px 60px; font-size: 20px; line-height: 1.8; max-width: 500px; }
        .tree-section { flex: 1; position: relative; height: 550px; display: flex; align-items: flex-end; justify-content: center; }
        #cursor { color: #ffca28; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        canvas { position: absolute; bottom: 0; }
        .bottom-line { position: absolute; bottom: 30px; left: 10%; width: 80%; height: 3px; background-color: #4a3320; border-radius: 2px; }
        @media (max-width: 768px) { .container { flex-direction: column; justify-content: flex-start; padding-top: 60px; } .text-section { font-size: 16px; padding: 20px 30px; margin-top: 20px; } .tree-section { height: 350px; } }
    </style>
</head>
<body>

    <button class="btn-music" id="btnMusic">Tócame 🎵</button>

    <div class="container">
        <div class="text-section">
            <span id="text"></span><span id="cursor">_</span>
        </div>
        <div class="tree-section">
            <canvas id="treeCanvas"></canvas>
        </div>
    </div>

    <div class="bottom-line"></div>

    <audio id="bgMusic" src="Mitski.mp3" loop></audio>

    <script>
        const fullText = "Hola, Técnicamente si cuentan como flores ¿No?\n\nLas primeras que doy:\n\nA alguien que odio pero sigo amando,\npasa lindo día Hazel.\n\n— Te Aprecio mucho!";
        const textEl = document.getElementById('text');
        let idx = 0;

        function typeText() {
            if (idx < fullText.length) {
                let char = fullText.charAt(idx);
                textEl.innerHTML += (char === '\n') ? '<br>' : char;
                idx++;
                setTimeout(typeText, 45);
            } else {
                startAnimation();
            }
        }

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 450;
        canvas.height = 500;

        const maxTrunkHeight = 160;
        let trunkHeight = 0;
        let branchesDrawn = false;
        let flowers = [];
        let totalFlowers = 1800; // MUCHAS flores
        const cx = 225;
        const cy = 210;

        function drawFlower(x, y, size, opacity) {
            ctx.fillStyle = `rgba(251, 188, 4, ${opacity})`;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.ellipse(x, y, size, size / 2.5, (i * Math.PI) / 4, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.fillStyle = `rgba(107, 74, 49, ${opacity})`;
            ctx.beginPath();
            ctx.arc(x, y, size / 2.5, 0, 2 * Math.PI);
            ctx.fill();
        }

        function drawTrunkAndBranches(height) {
            ctx.fillStyle = '#4a2f1d';
            ctx.beginPath();
            ctx.moveTo(210, 500);
            ctx.lineTo(240, 500);
            ctx.lineTo(232, 500 - height);
            ctx.lineTo(218, 500 - height);
            ctx.fill();

            if (height >= maxTrunkHeight) {
                ctx.strokeStyle = '#4a2f1d';
                ctx.lineCap = 'round';
                ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(225, 350); ctx.lineTo(170, 280); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(225, 350); ctx.lineTo(280, 270); ctx.stroke();
                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.moveTo(195, 310); ctx.lineTo(150, 315); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(255, 310); ctx.lineTo(310, 305); ctx.stroke();
            }
        }

        function generateHeartCoords(num) {
            let coords = [];
            for (let i = 0; i < num; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * 0.95; 
                const heartX = 16 * Math.pow(Math.sin(t), 3);
                const heartY = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                coords.push({
                    targetX: cx + heartX * 8.5 * r,
                    targetY: cy + heartY * 8.5 * r
                });
            }
            return coords;
        }

        function initFlowers() {
            let heartCoords = generateHeartCoords(totalFlowers);
            for (let f of heartCoords) {
                flowers.push({
                    state: 'fall', // 'fall' o 'heart' o 'float'
                    x: cx + (Math.random() - 0.5) * 150,
                    y: cy - 150 - Math.random() * 100,
                    targetX: f.targetX,
                    targetY: f.targetY,
                    size: Math.random() * 5 + 2,
                    fallSpeed: Math.random() * 2 + 1,
                    wobblePhase: Math.random() * Math.PI * 2,
                    opacity: 0
                });
            }
            // Flores flotando por debajo
            for(let i=0; i<60; i++){
                flowers.push({
                    state: 'float',
                    x: cx + (Math.random() - 0.5) * 300,
                    y: cy + 180 + Math.random() * 150,
                    size: Math.random() * 3 + 1,
                    wobblePhase: Math.random() * Math.PI * 2,
                    opacity: Math.random() * 0.5 + 0.3
                });
            }
        }

        function startAnimation() {
            initFlowers();
            animate();
        }

        let time = 0;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time++;

            // 1. Dibujar tronco y ramas
            if (trunkHeight < maxTrunkHeight) {
                trunkHeight += 3;
            }
            drawTrunkAndBranches(trunkHeight);

            // 2. Dibujar y actualizar flores
            if (trunkHeight >= maxTrunkHeight) {
                for (let f of flowers) {
                    if (f.state === 'fall') {
                        f.opacity = Math.min(1, f.opacity + 0.05); // Fundido de entrada
                        f.y += f.fallSpeed;
                        // Balanceo suave
                        f.x += Math.sin(time * 0.05 + f.wobblePhase) * 0.3;

                        if (f.y >= f.targetY) {
                            f.y = f.targetY; f.x = f.targetX;
                            f.state = 'heart';
                        }
                    } else if (f.state === 'float') {
                        // Movimiento suave por debajo
                        f.y += Math.sin(time * 0.02 + f.wobblePhase) * 0.1;
                        f.x += Math.cos(time * 0.02 + f.wobblePhase) * 0.1;
                    }
                    // En estado 'heart', la flor ya no se mueve
                    drawFlower(f.x, f.y, f.size, f.opacity);
                }
            }

            // Seguir la animación
            requestAnimationFrame(animate);
        }

        const btnMusic = document.getElementById('btnMusic');
        const bgMusic = document.getElementById('bgMusic');
        btnMusic.addEventListener('click', () => {
            if (bgMusic.paused) { bgMusic.play(); } else { bgMusic.pause(); }
        });

        window.onload = () => { setTimeout(typeText, 500); };
    </script>
</body>
</html>
