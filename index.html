<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Hazel</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f6f1e3;
            font-family: 'Quicksand', sans-serif;
            color: #4a3320;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .btn-music {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #2b2b2b;
            color: #ffca28;
            border: 2px solid #ffca28;
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
        }

        .container {
            display: flex;
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            align-items: center;
            justify-content: center;
            padding-bottom: 40px;
        }

        .text-section {
            flex: 1;
            padding: 20px 60px;
            font-size: 20px;
            line-height: 1.8;
            max-width: 500px;
            z-index: 10;
        }

        .tree-section {
            flex: 1;
            position: relative;
            height: 550px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-right: 60px;
        }

        #cursor {
            color: #ffca28;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        canvas {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .bottom-line {
            position: absolute;
            bottom: 30px;
            left: 10%;
            width: 80%;
            height: 3px;
            background-color: #4a3320;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 60px;
            }
            .text-section {
                font-size: 16px;
                padding: 20px 30px;
                margin-top: 20px;
                text-align: center;
            }
            .tree-section {
                height: 350px;
                padding-right: 0;
            }
        }
    </style>
</head>
<body>

    <button class="btn-music" id="btnMusic">Tócame 🎵</button>

    <div class="container">
        <div class="text-section">
            <span id="text"></span><span id="cursor">_</span>
        </div>
        <div class="tree-section">
            <canvas id="treeCanvas"></canvas>
        </div>
    </div>

    <div class="bottom-line"></div>

    <audio id="bgMusic" src="Mitski.mp3" loop></audio>

    <script>
        const fullText = "Hola, Técnicamente si cuentan como flores ¿No?\n\nLas primeras que doy:\n\nA alguien que odio pero sigo amando,\npasa lindo día Hazel.\n\n— Te Aprecio mucho!";
        const textEl = document.getElementById('text');
        let idx = 0;

        function typeText() {
            if (idx < fullText.length) {
                let char = fullText.charAt(idx);
                textEl.innerHTML += (char === '\n') ? '<br>' : char;
                idx++;
                setTimeout(typeText, 45); 
            } else {
                startAnimation(); 
            }
        }

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 450;
        canvas.height = 500;

        const maxTrunkHeight = 160;
        let trunkHeight = 0;
        let flowers = [];
        const totalHeartFlowers = 1800; 
        const totalGroundFlowers = 40; 
        
        const cx = canvas.width / 2; 
        // Centro del corazón bajado para cubrir las ramas
        const cy = 230; 

        // Función rediseñada para permitir rotación sobre su propio eje
        function drawFlower(x, y, size, opacity, rotation) {
            ctx.save(); 
            ctx.translate(x, y); 
            ctx.rotate(rotation); 

            ctx.fillStyle = `rgba(251, 188, 4, ${opacity})`;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.ellipse(0, 0, size, size / 2.5, (i * Math.PI) / 4, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.fillStyle = `rgba(107, 74, 49, ${opacity})`;
            ctx.beginPath();
            ctx.arc(0, 0, size / 2.5, 0, 2 * Math.PI);
            ctx.fill();

            ctx.restore(); 
        }

        function drawTrunkAndBranches(height) {
            ctx.fillStyle = '#4a2f1d';
            ctx.beginPath();
            ctx.moveTo(cx - 15, 500); 
            ctx.lineTo(cx + 15, 500); 
            ctx.lineTo(cx + 7, 500 - height); 
            ctx.lineTo(cx - 7, 500 - height); 
            ctx.fill();

            if (height >= maxTrunkHeight) {
                ctx.strokeStyle = '#4a2f1d';
                ctx.lineCap = 'round';
                const yBranches = 500 - maxTrunkHeight; // Base de ramas en Y=340

                // Ramas más cortas y contenidas para quedar dentro
                ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(cx, yBranches + 10); ctx.lineTo(cx - 45, yBranches - 50); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, yBranches + 10); ctx.lineTo(cx + 45, yBranches - 40); ctx.stroke();

                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.moveTo(cx - 20, yBranches - 20); ctx.lineTo(cx - 60, yBranches - 15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + 20, yBranches - 20); ctx.lineTo(cx + 65, yBranches - 25); ctx.stroke();
            }
        }

        function generateHeartCoords(num) {
            let coords = [];
            for (let i = 0; i < num; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * 0.9; 
                const heartX = 16 * Math.pow(Math.sin(t), 3);
                const heartY = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                coords.push({
                    targetX: cx + heartX * 8 * r, 
                    targetY: cy + heartY * 8 * r
                });
            }
            return coords;
        }

        function initFlowers() {
            // 1. Flores del Corazón (caen desde arriba)
            let heartCoords = generateHeartCoords(totalHeartFlowers);
            for (let f of heartCoords) {
                flowers.push({
                    type: 'heart',
                    state: 'fall',
                    x: cx + (Math.random() - 0.5) * 150, 
                    y: cy - 200 - Math.random() * 100,
                    targetX: f.targetX,
                    targetY: f.targetY,
                    size: Math.random() * 5 + 2, 
                    fallSpeed: Math.random() * 2 + 1,
                    wobblePhase: Math.random() * Math.PI * 2,
                    rotation: Math.random() * Math.PI * 2, // Rotación inicial
                    rotationSpeed: (Math.random() - 0.5) * 0.1, // Velocidad de giro al caer
                    opacity: 0
                });
            }

            // 2. Flores del Suelo (estáticas pero girando)
            for (let i = 0; i < totalGroundFlowers; i++) {
                flowers.push({
                    type: 'ground',
                    x: cx + (Math.random() - 0.5) * 220, // Dispersas en el suelo
                    y: 460 + Math.random() * 35, // Altura del suelo
                    size: Math.random() * 4 + 2.5,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.04, // Giro constante y suave
                    opacity: 0
                });
            }
        }

        function startAnimation() {
            initFlowers();
            animate();
        }

        let time = 0;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time++;

            if (trunkHeight < maxTrunkHeight) {
                trunkHeight += 3;
            }
            drawTrunkAndBranches(trunkHeight);

            if (trunkHeight >= maxTrunkHeight) {
                for (let f of flowers) {
                    if (f.type === 'heart') {
                        if (f.state === 'fall') {
                            f.opacity = Math.min(1, f.opacity + 0.05); 
                            f.y += f.fallSpeed;
                            f.x += Math.sin(time * 0.05 + f.wobblePhase) * 0.3;
                            f.rotation += f.rotationSpeed; // Gira mientras cae

                            if (f.y >= f.targetY) {
                                f.y = f.targetY; 
                                f.x = f.targetX;
                                f.state = 'settled';
                            }
                        }
                    } else if (f.type === 'ground') {
                        f.opacity = Math.min(1, f.opacity + 0.02); // Aparecen gradualmente
                        f.rotation += f.rotationSpeed; // Siempre giran
                    }

                    // Se dibuja cada flor con su ángulo actual
                    drawFlower(f.x, f.y, f.size, f.opacity, f.rotation);
                }
            }

            requestAnimationFrame(animate);
        }

        const btnMusic = document.getElementById('btnMusic');
        const bgMusic = document.getElementById('bgMusic');
        btnMusic.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
            } else {
                bgMusic.pause();
            }
        });

        window.onload = () => {
            setTimeout(typeText, 500);
        };
    </script>
</body>
</html>
